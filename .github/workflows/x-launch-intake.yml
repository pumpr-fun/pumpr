name: X launch intake

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Parse and reply/queue without launching"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "*/30 * * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/x-launch-intake.yml"
      - "scripts/x-launch-intake.js"
      - "scripts/x-launch-intake-loop.js"
      - "scripts/signed-bill-image.js"
      - "scripts/assets/pumpr-parody-bill-template.png"

permissions:
  contents: read
  actions: write

concurrency:
  group: x-launch-intake
  cancel-in-progress: true

jobs:
  intake:
    runs-on: ubuntu-latest
    # Short self-dispatching workers let browser changes replace stale workers promptly.
    timeout-minutes: 45
    env:
      APP_BASE_URL: ${{ vars.APP_BASE_URL || vars.PUBLIC_BASE_URL || 'https://pump-r.fun' }}
      PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL || 'https://pump-r.fun' }}
      X_LAUNCH_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || vars.X_LAUNCH_DRY_RUN || 'false' }}
      X_LAUNCH_AUTOPILOT_ENABLED: ${{ vars.X_LAUNCH_AUTOPILOT_ENABLED || 'true' }}
      X_LAUNCH_ALLOW_PUBLIC: ${{ vars.X_LAUNCH_ALLOW_PUBLIC || 'true' }}
      X_LAUNCH_ALLOWED_USERNAMES: ${{ vars.X_LAUNCH_ALLOWED_USERNAMES || '' }}
      X_LAUNCH_ALLOWED_USER_IDS: ${{ vars.X_LAUNCH_ALLOWED_USER_IDS || '' }}
      X_LAUNCH_MAX_MENTIONS: ${{ vars.X_LAUNCH_MAX_MENTIONS || '50' }}
      X_LAUNCH_MENTION_SOURCE: browser
      X_LAUNCH_EMPTY_FETCH_BACKOFF_MINUTES: ${{ vars.X_LAUNCH_EMPTY_FETCH_BACKOFF_MINUTES || '0' }}
      X_LAUNCH_ACTIVE_FETCH_BACKOFF_MINUTES: ${{ vars.X_LAUNCH_ACTIVE_FETCH_BACKOFF_MINUTES || '0' }}
      X_LAUNCH_LOOP_INTERVAL_SECONDS: ${{ vars.X_LAUNCH_LOOP_INTERVAL_SECONDS || '30' }}
      X_LAUNCH_LOOP_RUNS: ${{ vars.X_LAUNCH_LOOP_RUNS || '20' }}
      X_LAUNCH_SELF_DISPATCH: ${{ vars.X_LAUNCH_SELF_DISPATCH || 'true' }}
      X_LAUNCH_WORKFLOW: x-launch-intake.yml
      X_LAUNCH_WORKFLOW_REF: ${{ github.ref_name }}
      GITHUB_TOKEN: ${{ github.token }}
      X_LAUNCH_ROBINHOOD_RPC_URL: ${{ vars.X_LAUNCH_ROBINHOOD_RPC_URL || vars.ROBINHOOD_RPC_URL || '' }}
      X_LAUNCH_ROBINHOOD_CREATOR_BPS: ${{ vars.X_LAUNCH_ROBINHOOD_CREATOR_BPS || '0' }}
      X_LAUNCH_ROBINHOOD_TRADE_FEE_BPS: ${{ vars.X_LAUNCH_ROBINHOOD_TRADE_FEE_BPS || '50' }}
      PUMPR_X_USERNAME: pumpr_launch
      PUMPR_X_USER_ID: ${{ vars.PUMPR_X_USER_ID || '' }}
      X_LAUNCH_INTAKE_STATE_PATH: cache/x-launch-intake-state.json
      X_LAUNCH_INTAKE_QUEUE_PATH: cache/x-launch-queue.json
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_X_LAUNCH_MODEL: ${{ vars.OPENAI_X_LAUNCH_MODEL || vars.OPENAI_AGENT_MODEL || vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
      PUMPR_X_COOKIE: ${{ secrets.PUMPR_X_COOKIE || secrets.X_PUMPR_COOKIE || secrets.PUMPR_TWEX_X_COOKIE || secrets.TWEXAPI_PUMPR_X_COOKIE }}
      X_LAUNCH_TWEXAPI_BEARER_TOKEN: ${{ secrets.X_LAUNCH_TWEXAPI_BEARER_TOKEN }}
      X_LAUNCH_TWEXAPI_PROXY: ${{ secrets.X_LAUNCH_TWEXAPI_PROXY || vars.X_LAUNCH_TWEXAPI_PROXY || '' }}
      X_LAUNCH_REPLY_TWEXAPI_FIRST: ${{ vars.X_LAUNCH_REPLY_TWEXAPI_FIRST || 'true' }}
      X_LAUNCH_REPLY_TWEXAPI_ONLY: ${{ vars.X_LAUNCH_REPLY_TWEXAPI_ONLY || 'true' }}
      X_LAUNCH_SOLANA_PRIVATE_KEY: ${{ secrets.X_LAUNCH_SOLANA_PRIVATE_KEY || secrets.PUMPR_X_LAUNCH_SOLANA_PRIVATE_KEY }}
      X_LAUNCH_ROBINHOOD_MNEMONIC: ${{ secrets.X_LAUNCH_ROBINHOOD_MNEMONIC || secrets.PUMPR_X_LAUNCH_ROBINHOOD_MNEMONIC }}
      X_LAUNCH_ROBINHOOD_PRIVATE_KEY: ${{ secrets.X_LAUNCH_ROBINHOOD_PRIVATE_KEY || secrets.PUMPR_X_LAUNCH_ROBINHOOD_PRIVATE_KEY }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install runtime dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Install browser watcher dependencies
        if: ${{ env.X_LAUNCH_MENTION_SOURCE == 'browser' }}
        run: |
          npm install --no-save --package-lock=false playwright@1.49.1
          npx playwright install chromium

      - name: Restore X launch intake memory
        uses: actions/cache/restore@v4
        with:
          path: |
            cache/x-launch-intake-state.json
            cache/x-launch-queue.json
          key: x-launch-intake-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            x-launch-intake-

      - name: Fetch @pumpr_launch mentions every 30 seconds
        run: node scripts/x-launch-intake-loop.js

      - name: Save X launch intake memory
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            cache/x-launch-intake-state.json
            cache/x-launch-queue.json
          key: x-launch-intake-${{ github.run_id }}-${{ github.run_attempt }}
