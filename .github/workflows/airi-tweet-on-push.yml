name: Airi tweet on push

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Tweet mode"
        required: false
        default: "thought"
        type: choice
        options:
          - thought
          - world
          - push
          - issue
      context:
        description: "Extra issue/thought context for Airi"
        required: false
        default: ""
      force:
        description: "Ignore prior tweet memory for this manual run"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: airi-tweet-on-push-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tweet:
    runs-on: ubuntu-latest
    env:
      AIRI_TWEET_ENABLED: ${{ vars.AIRI_TWEET_ENABLED || 'true' }}
      AIRI_TWEET_DRY_RUN: ${{ vars.AIRI_TWEET_DRY_RUN || 'false' }}
      AIRI_TWEET_MODE: ${{ github.event.inputs.mode || 'push' }}
      AIRI_TWEET_CONTEXT: ${{ github.event.inputs.context || '' }}
      AIRI_TWEET_FORCE: ${{ github.event.inputs.force || 'false' }}
      AIRI_TWEET_HISTORY_PATH: .airi-tweet-history.json
      AIRI_TWEET_REQUIRE_POST: ${{ vars.AIRI_TWEET_REQUIRE_POST || 'true' }}
      AIRI_THOUGHT_TWEET_CHANCE: ${{ vars.AIRI_THOUGHT_TWEET_CHANCE || '0.35' }}
      AIRI_X_USERNAME: ${{ vars.AIRI_X_USERNAME || 'airi_agi' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_AIRI_TWEET_MODEL: ${{ vars.OPENAI_AIRI_TWEET_MODEL || vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
      AIRI_X_COOKIE: ${{ secrets.AIRI_X_COOKIE || secrets.AIRI_TWITTER_COOKIE || secrets.TWITTER_X_COOKIE || secrets.X_COOKIE || secrets.TWEXAPI_X_COOKIE }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install browser poster
        run: |
          npm install --no-save --package-lock=false playwright@1.49.1
          npx playwright install chromium

      - name: Restore Airi tweet memory
        uses: actions/cache/restore@v4
        with:
          path: .airi-tweet-history.json
          key: airi-tweet-history-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            airi-tweet-history-

      - name: Let Airi tweet
        run: node scripts/airi-tweet-on-push.js

      - name: Save Airi tweet memory
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .airi-tweet-history.json
          key: airi-tweet-history-${{ github.run_id }}-${{ github.run_attempt }}
